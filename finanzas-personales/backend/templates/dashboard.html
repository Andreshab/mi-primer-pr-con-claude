{% extends "base.html" %}
{% block title %}Dashboard — Finanzas{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Dashboard</h1>
  <span class="text-sm text-gray-500">{{ month }}</span>
</div>

<!-- Refreshes when a transaction is created from the global modal -->
<div hx-get="/partials/dashboard"
     hx-trigger="transactionCreated from:body"
     hx-swap="innerHTML">
  {% include "partials/dashboard_content.html" %}
</div>
{% endblock %}
