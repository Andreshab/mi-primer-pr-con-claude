<div id="cat-{{ cat.id }}" class="bg-white rounded-xl border border-gray-200 p-4 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <span class="text-2xl w-10 h-10 flex items-center justify-center rounded-lg"
          style="background-color: {{ cat.color }}22;">{{ cat.icon }}</span>
    <div>
      <p class="text-sm font-medium text-gray-800">{{ cat.name }}</p>
      <span class="text-xs px-2 py-0.5 rounded-full font-medium
                   {{ 'bg-green-100 text-green-700' if cat.type == 'income' else 'bg-rose-100 text-rose-700' }}">
        {{ 'Ingreso' if cat.type == 'income' else 'Gasto' }}
      </span>
    </div>
  </div>
  <button hx-delete="/partials/categories/{{ cat.id }}"
          hx-target="#cat-{{ cat.id }}"
          hx-swap="outerHTML"
          hx-confirm="¿Eliminar categoría '{{ cat.name }}'?"
          class="text-xs text-gray-300 hover:text-rose-500 transition-colors ml-2">
    ✕
  </button>
</div>
