{% extends "base.html" %}
{% block title %}Metas — Finanzas{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Metas de ahorro</h1>
  <button onclick="document.getElementById('goal-form').classList.toggle('hidden')"
          class="bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg hover:bg-indigo-700">
    + Nueva meta
  </button>
</div>

<!-- Add goal form -->
<div id="goal-form" class="hidden bg-white rounded-xl border border-gray-200 p-5 mb-6">
  <h2 class="font-semibold text-gray-800 mb-4">Nueva meta</h2>
  <form hx-post="/partials/goals"
        hx-target="#goals-list"
        hx-swap="afterbegin"
        hx-on::after-request="this.reset(); document.getElementById('goal-form').classList.add('hidden')"
        class="grid grid-cols-3 gap-4 items-end">
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Nombre</label>
      <input type="text" name="name" required placeholder="Ej. Vacaciones"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Monto objetivo</label>
      <input type="number" name="target_amount" step="0.01" min="1" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-xs font-medium text-gray-600 mb-1">Fecha límite (opcional)</label>
      <input type="date" name="goal_date"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div class="col-span-3 flex gap-3 justify-end">
      <button type="button" onclick="document.getElementById('goal-form').classList.add('hidden')"
              class="text-sm text-gray-500 hover:text-gray-700 px-4 py-2">Cancelar</button>
      <button type="submit"
              class="bg-indigo-600 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-indigo-700">
        Crear meta
      </button>
    </div>
  </form>
</div>

<!-- Goals list -->
<div id="goals-list" class="space-y-4">
  {% for goal in goals %}
    {% include "partials/goal_card.html" %}
  {% else %}
  <div class="bg-white rounded-xl border border-gray-200 p-10 text-center text-gray-400">
    <p class="text-3xl mb-2">🎯</p>
    <p class="text-sm">No tienes metas de ahorro. ¡Crea una para empezar!</p>
  </div>
  {% endfor %}
</div>
{% endblock %}
